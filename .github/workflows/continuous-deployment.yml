name: Continuous Deployment
on:
    workflow_dispatch:
    push:
        branches:
            - main
env:
    BACKEND1_REPOSITORY: 004-apps/backend1
    BACKEND2_REPOSITORY: 004-apps/backend2
    IMAGE_TAG: ${{ github.sha }}

permissions:
    id-token: write
    contents: read

jobs:
    backend:
        name: Deploy backend
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.0.0
              with:
                  aws-region: us-east-1
                  role-to-assume: ${{ secrets.AWS_KUBERNETES_INFRA_PROJECT_GITHUB_ROLE_ARN }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build, tag, and push docker image to Amazon ECR
              env:
                  REGISTRY: ${{ steps.login-ecr.outputs.registry }}
              run: |
                  docker build -f ./004-apps/backend1/Dockerfile \
                      -t $REGISTRY/$BACKEND1_REPOSITORY:$IMAGE_TAG \
                      ./004-apps/backend1
                  docker push $REGISTRY/$BACKEND1_REPOSITORY:$IMAGE_TAG

    backend2:
        name: Deploy backend2
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.0.0
              with:
                  aws-region: us-east-1
                  role-to-assume: ${{ secrets.AWS_KUBERNETES_INFRA_PROJECT_GITHUB_ROLE_ARN }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build, tag, and push docker image to Amazon ECR
              env:
                  REGISTRY: ${{ steps.login-ecr.outputs.registry }}
              run: |
                  docker build -f ./004-apps/backend2/Dockerfile \
                      -t $REGISTRY/$BACKEND2_REPOSITORY:$IMAGE_TAG \
                      ./004-apps/backend2
                  docker push $REGISTRY/$BACKEND2_REPOSITORY:$IMAGE_TAG
